# Project-local Codex config, hooks, rules, and agents load only when
# Codex trusts the project. Changed hooks may also need review in Codex.
# Codex also supports permission profiles; this template keeps the simpler
# sandbox_mode settings until a project deliberately migrates runtime policy.
approval_policy = "on-request"
approvals_reviewer = "user"
sandbox_mode = "workspace-write"
web_search = "cached"
model_reasoning_effort = "high"
personality = "pragmatic"

[features]
multi_agent = true
hooks = true

[agents]
max_threads = 4
max_depth = 1

[sandbox_workspace_write]
network_access = false

[shell_environment_policy]
inherit = "core"
ignore_default_excludes = false
exclude = ["*KEY*", "*SECRET*", "*TOKEN*", "*PASSWORD*", "DATABASE_URL"]

# Init may add approved project-local MCP servers below.
# Do not store secret values here; use user-level config or environment variables.
